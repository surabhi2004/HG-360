 {% block scripts %}



 
  <script>


    
    let userRoutine = [];

function addRoutine() {
  const activity = document.getElementById("activity").value;
  const time = document.getElementById("time").value;

  if (!activity || !time) return alert("Fill all fields");

  userRoutine.push({ activity, time });

  saveRoutine();
}

async function saveRoutine() {
  await fetch("/api/save-routine", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(userRoutine)
  });

  loadUserRoutine();
}
    // Mark tasks as done
    async function loadUserRoutine() {
  const res = await fetch("/api/get-user-routine");
  const data = await res.json();

  const list = document.getElementById("tasks-list");

  // ✅ IMPORTANT LINE (YOU MISSED THIS)
  userRoutine = data;

  if (!data || data.length === 0) {
    list.innerHTML = "<p>No custom routine yet</p>";
    return;
  }

  list.innerHTML = data.map(item => `
    <li class="flex justify-between p-3 border rounded">
      <div>
        <p class="font-bold">${item.activity}</p>
        <p>${item.time}</p>
      </div>
      <button onclick="deleteRoutine('${item.time}')">❌</button>
    </li>
  `).join("");
}
function deleteRoutine(time) {
  userRoutine = userRoutine.filter(r => r.time !== time);
  saveRoutine();
}

loadUserRoutine();
    document.querySelectorAll('#tasks-list button').forEach(button => {
      button.addEventListener('click', event => {
        const li = button.closest('li');
        const dot = li.querySelector('div > div');
        const text = li.querySelector('p.font-medium');

        // Mark done only if not already done
        if (!button.disabled) {
          dot.classList.remove('bg-gray-300');
          dot.classList.add('bg-green-600');
          text.classList.add('text-strike-through');
          button.textContent = 'Done';
          button.disabled = true;
          button.classList.add('text-gray-400', 'cursor-default');
          button.classList.remove('hover:bg-gray-200');
          button.setAttribute('aria-disabled', 'true');
          button.blur();
        }
      });
    });
</script>
